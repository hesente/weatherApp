        <button type="button" class="search-btn btn" aria-label="Поиск">

            stroke-width="1.5"

        </button>

        <button class="btn-geolocation btn">

              d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"

            <path
